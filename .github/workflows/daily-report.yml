name: Daily AI Job Report

on:
  schedule:
    # 09:00 JST every day. GitHub Actions cron uses UTC.
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      BING_SEARCH_API_KEY: ${{ secrets.BING_SEARCH_API_KEY }}
      BING_SEARCH_ENDPOINT: https://api.bing.microsoft.com/v7.0/search
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate report
        shell: bash
        run: |
          TODAY=$(TZ=Asia/Tokyo date +%F)
          mkdir -p reports

          FIXTURE_ARGS=""
          if [ -z "${BING_SEARCH_API_KEY}" ]; then
            echo "BING_SEARCH_API_KEY is not set. Using fixture for a demo report."
            FIXTURE_ARGS="--fixture fixtures/sample_linkedin_results.json"
          fi

          ai-job-hunter ${FIXTURE_ARGS} \
            --query 'site:linkedin.com/jobs AI OR ChatGPT OR LLM remote contract Japan assistant annotation prompt' \
            --max-results 10 \
            --top-n 5 \
            --timezone Asia/Tokyo \
            --report-output "reports/${TODAY}.md" \
            --output "reports/${TODAY}_crowdworks_draft.md" \
            --json-output "reports/${TODAY}_selected_candidate.json"

          cp "reports/${TODAY}.md" reports/latest.md

      - name: Commit report
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Add daily AI job report"
            git push
          fi
